
services:
  db:
    image: postgres:16
    container_name: flash-sale-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flash_sale
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flash-sale-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: flash-sale-rabbitmq
    ports:
      - "5672:5672"   # The port Spring Boot uses to talk to RabbitMQ
      - "15672:15672" # The port for the Web UI Dashboard
volumes:
  pgdata:
    
